name: PR Previews

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed component files
        id: changed
        run: |
          # Get changed files in the PR
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '\.(tsx?|jsx?)$' || true)
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

          # Extract component paths (files in src/components/)
          COMPONENTS=$(echo "$CHANGED" | grep 'src/components/' || true)
          echo "components=$COMPONENTS" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.changed.outputs.components != ''
        run: cd vite-app && npm ci

      - name: Build changed component previews
        if: steps.changed.outputs.components != ''
        run: |
          cd vite-app
          mkdir -p .component-preview/dist

          # For each changed component file, check if a preview exists and build it
          echo "${{ steps.changed.outputs.components }}" | while read file; do
            # Convert component path to preview path
            preview_path="${file%.*}.preview.tsx"

            if [ -f "$preview_path" ]; then
              echo "📦 Building preview for $file..."
              safe_name=$(echo "$preview_path" | sed 's|/|_|g' | sed 's|\.preview\.tsx||')
              node build-cli.js --entry "$preview_path" --out ".component-preview/dist/$safe_name"
            fi
          done

      - name: Deploy to Cloudflare Pages
        if: steps.changed.outputs.components != ''
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: component-preview
          directory: vite-app/.component-preview/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate preview URLs
        if: steps.changed.outputs.components != ''
        id: urls
        run: |
          cd vite-app
          urls=""
          echo "${{ steps.changed.outputs.components }}" | while read file; do
            preview_path="${file%.*}.preview.tsx"
            if [ -f "$preview_path" ]; then
              safe_name=$(echo "$preview_path" | sed 's|/|_|g' | sed 's|\.preview\.tsx||')
              component_name=$(basename "$file" | sed 's/\.[^.]*$//')
              urls="$urls\n- [$component_name](https://${{ github.sha }}.component-preview.pages.dev/$safe_name/)"
            fi
          done
          echo "urls=$urls" >> $GITHUB_OUTPUT

      - name: Comment PR with preview URLs
        if: steps.changed.outputs.components != ''
        uses: actions/github-script@v7
        with:
          script: |
            const urls = `${{ steps.urls.outputs.urls }}`;
            if (urls.trim()) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🚀 Component Previews\n\nPreviews for changed components:\n${urls}\n\nBuilt from commit: ${context.sha}`
              });
            }